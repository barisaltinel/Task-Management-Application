spring.profiles.active=dev

server.port=8080

# Development-focused example.
# Copy this file to a local, ignored application.properties or export these values
# as environment variables before starting the backend.
spring.datasource.url=jdbc:mysql://localhost:3306/taskmanagement?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.username=your_mysql_username
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Keep the H2 console disabled by default unless you are explicitly debugging with H2
# in a non-production profile.
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

logging.level.org.springframework.security=INFO

# RabbitMQ is optional. Leave this disabled unless you have a broker configured
# and want task-management events published to a real exchange.
app.rabbitmq.enabled=false
app.rabbitmq.exchange=taskmanagement.events
app.rabbitmq.queue=taskmanagement.activity
app.rabbitmq.routing-key=taskmanagement.activity
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Redis is also optional. Keep it off by default and enable it only when you
# want shared cache entries instead of the in-memory fallback cache.
app.redis.enabled=false
app.redis.cache-ttl=10m
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=2s
spring.data.redis.repositories.enabled=false

# Optional bootstrap admin
app.bootstrap.admin.name=Bootstrap Admin
app.bootstrap.admin.email=admin@example.com
app.bootstrap.admin.password=change-me
