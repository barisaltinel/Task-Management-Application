spring.profiles.active=prod

server.port=8080

# Production example. Prefer real secrets from your deployment environment or secret manager.
spring.datasource.url=jdbc:mysql://prod-db-host:3306/taskmanagement?useSSL=true&requireSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# H2 console should remain off in production.
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

logging.level.org.springframework.security=INFO

# Optional messaging integration
app.rabbitmq.enabled=false
app.rabbitmq.exchange=taskmanagement.events
app.rabbitmq.queue=taskmanagement.activity
app.rabbitmq.routing-key=taskmanagement.activity
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# Optional shared cache integration
app.redis.enabled=false
app.redis.cache-ttl=10m
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=2s
spring.data.redis.repositories.enabled=false

# In production, seed users should normally be handled outside the app startup path.
app.bootstrap.admin.name=
app.bootstrap.admin.email=
app.bootstrap.admin.password=
