services:
  mysql:
    image: mysql:8.4
    container_name: taskmanagement-mysql
    environment:
      MYSQL_DATABASE: taskmanagement
      MYSQL_USER: taskapp
      MYSQL_PASSWORD: taskapp123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: taskmanagement-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    container_name: taskmanagement-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: taskmanagement-backend
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/taskmanagement?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: taskapp
      SPRING_DATASOURCE_PASSWORD: taskapp123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_OPEN_IN_VIEW: "false"
      APP_BOOTSTRAP_ADMIN_NAME: Bootstrap Admin
      APP_BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      APP_BOOTSTRAP_ADMIN_PASSWORD: change-me-now
      APP_RABBITMQ_ENABLED: "true"
      APP_RABBITMQ_EXCHANGE: taskmanagement.events
      APP_RABBITMQ_QUEUE: taskmanagement.activity
      APP_RABBITMQ_ROUTING_KEY: taskmanagement.activity
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_RABBITMQ_VIRTUAL_HOST: /
      APP_REDIS_ENABLED: "true"
      APP_REDIS_CACHE_TTL: 10m
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_DATABASE: 0
      SPRING_DATA_REDIS_TIMEOUT: 2s
      SPRING_DATA_REDIS_REPOSITORIES_ENABLED: "false"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: taskmanagement-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:8080"

volumes:
  mysql_data:
  rabbitmq_data:
  redis_data:
  backend_uploads:
